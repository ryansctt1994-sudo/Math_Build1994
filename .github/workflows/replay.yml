name: Replay Governance

on:
  workflow_dispatch:
  schedule:
    # Weekly replay obligation: Sunday 02:00 UTC.
    - cron: "0 2 * * 0"

permissions:
  contents: write
  issues: write

jobs:
  replay:
    name: Replay latest build receipt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Lean and build dependencies
        uses: leanprover/lean-action@v1
        with:
          use-github-cache: true
          build-args: MathBuild

      - name: Generate build receipt for current build
        run: |
          mkdir -p receipts/build receipts/replay
          python scripts/generate_build_receipt.py \
            --result PASS \
            --command "lake build MathBuild" \
            --output receipts/build/build_receipt_latest.json

      - name: Replay latest build receipt
        id: replay
        run: |
          python scripts/replay_build.py receipts/build/build_receipt_latest.json --no-checkout

      - name: Upload replay artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-artifacts
          path: |
            receipts/build/build_receipt_latest.json
            receipts/replay/replay_matrix.json
            receipts/replay/replay_result_*.json

      - name: Commit replay matrix update
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add receipts/build/build_receipt_latest.json receipts/replay/replay_matrix.json receipts/replay/replay_result_*.json || true
          if ! git diff --cached --quiet; then
            git commit -m "Append replay governance evidence"
            git push
          else
            echo "No replay evidence changes to commit."
          fi

      - name: Create replay failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Replay governance failure";
            const body = [
              "A scheduled or manual replay governance run failed.",
              "",
              `Workflow: ${context.workflow}`,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "This is a constitutional replay alert: investigate dependency, toolchain, environment, or provenance drift."
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "replay-failure"
            });

            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["replay-failure"]
              });
            }
