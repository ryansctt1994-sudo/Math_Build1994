name: Lean Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build MathBuild
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          use-github-cache: true
          auto-config: false

      - name: Repository self-check
        run: python scripts/check_repo.py

      - name: Update Lake dependencies
        run: lake update

      - name: Build MathBuild
        run: lake build MathBuild
