name: Lean Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build MathBuild
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Lean and build
        uses: leanprover/lean-action@v1
        with:
          use-github-cache: true
          build-args: MathBuild
